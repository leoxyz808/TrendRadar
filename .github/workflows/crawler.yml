name: TrendRadar Hot News Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install beautifulsoup4 lxml markdown jinja2
        
    - name: Create docs directory
      run: |
        mkdir -p docs
        rm -rf docs/*
        
    - name: Run TrendRadar
      run: |
        python main.py
        continue-on-error: true
        
    - name: Create simple index.html
      run: |
        cat > docs/index.html << 'EOF'
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendRadar - 热点聚合</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; 
            padding: 40px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        h1 { 
            color: #333; 
            text-align: center; 
            margin-bottom: 20px;
            font-size: 2.5em;
            font-weight: 700;
        }
        .update-time { 
            text-align: center; 
            color: #666; 
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .placeholder { 
            text-align: center; 
            padding: 60px; 
            color: #888;
            background: #f8f9fa;
            border-radius: 12px;
            margin: 20px 0;
        }
        .emoji {
            font-size: 4em;
            display: block;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 TrendRadar 热点聚合</h1>
        <div class="update-time">最后更新: $(date '+%Y-%m-%d %H:%M:%S')</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">35+</div>
                <div>监控平台</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">24/7</div>
                <div>实时监控</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">AI</div>
                <div>智能分析</div>
            </div>
        </div>
        
        <div class="placeholder">
            <span class="emoji">⚡</span>
            <h2>热点数据抓取中...</h2>
            <p>系统正在从各大平台抓取最新热点数据</p>
            <p>包含抖音、知乎、B站、微博等35个热门平台</p>
            <p>下次更新时间: $(date -d '+6 hours' '+%Y-%m-%d %H:%M')</p>
        </div>
        
        <div class="footer">
            <p>Powered by TrendRadar | 基于开源项目 TrendRadar</p>
            <p>自动每6小时更新 • 支持手动触发</p>
        </div>
    </div>
</body>
</html>
EOF
        
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './docs'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
