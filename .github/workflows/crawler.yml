name: TrendRadar Hot News Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
      
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install jinja2 requests beautifulsoup4 lxml markdown
        
    - name: Create docs directory
      run: mkdir -p docs
      
    - name: Run TrendRadar crawler
      run: |
        python main.py headless --output ./docs/index.html --run-once --debug
      env:
        # 添加需要的环境变量（根据项目需求）
        GITHUB_ACTIONS: true
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './docs'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
